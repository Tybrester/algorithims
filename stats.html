    // ─────────────────────────────────────────────
    // FUTURES P&L CALCULATION (Real contract specs)
    // ─────────────────────────────────────────────
    function getFuturesTickValue(symbol) {
      const specs = {
        'ES=F': { tickSize: 0.25, tickValue: 12.50 },      // E-mini S&P 500
        'NQ=F': { tickSize: 0.25, tickValue: 5.00 },       // E-mini NASDAQ
        'YM=F': { tickSize: 1, tickValue: 5.00 },          // E-mini Dow
        'RTY=F': { tickSize: 0.1, tickValue: 5.00 },       // E-mini Russell 2000
        'CL=F': { tickSize: 0.01, tickValue: 10.00 },      // Crude Oil
        'GC=F': { tickSize: 0.1, tickValue: 10.00 },        // Gold
        'SI=F': { tickSize: 0.005, tickValue: 25.00 },     // Silver
        'HG=F': { tickSize: 0.0005, tickValue: 12.50 },    // Copper
        'NG=F': { tickSize: 0.001, tickValue: 10.00 },     // Natural Gas
        'ZN=F': { tickSize: 0.015625, tickValue: 15.625 }, // 10-Year T-Note
        'ZB=F': { tickSize: 0.03125, tickValue: 31.25 },   // 30-Year T-Bond
        'ZF=F': { tickSize: 0.0078125, tickValue: 7.8125 },// 5-Year T-Note
        '6E=F': { tickSize: 0.0001, tickValue: 12.50 },    // Euro FX
        '6J=F': { tickSize: 0.000001, tickValue: 12.50 },  // Japanese Yen
        '6B=F': { tickSize: 0.0001, tickValue: 6.25 },     // British Pound
        '6C=F': { tickSize: 0.0001, tickValue: 10.00 },    // Canadian Dollar
        '6A=F': { tickSize: 0.0001, tickValue: 10.00 },    // Australian Dollar
        'ZW=F': { tickSize: 0.25, tickValue: 12.50 },      // Wheat
        'ZC=F': { tickSize: 0.25, tickValue: 12.50 },      // Corn
        'ZS=F': { tickSize: 0.25, tickValue: 12.50 },      // Soybeans
        'ZL=F': { tickSize: 0.01, tickValue: 600.00 },     // Soybean Oil
      };
      return specs[symbol] || { tickSize: 0.01, tickValue: 1 }; // Default to stock-like
    }

    function calcFuturesPnL(symbol, entryPrice, exitPrice, qty, action) {
      if (!symbol.includes('=F')) {
        // Not a futures symbol - use stock calculation
        return action === 'buy'
          ? (exitPrice - entryPrice) * qty
          : (entryPrice - exitPrice) * qty;
      }

      // Calculate point difference
      const pointDiff = action === 'buy'
        ? exitPrice - entryPrice
        : entryPrice - exitPrice;

      // Get contract specs
      const { tickSize, tickValue } = getFuturesTickValue(symbol);

      // Calculate P&L: (point difference / tick size) * tick value * quantity
      const ticks = pointDiff / tickSize;
      const pnl = ticks * tickValue * qty;

      return pnl;
    }

    // Clear all trade data (user must type CONFIRM)
    async function clearAllData() {
      const confirmText = prompt('Type DELETE to permanently clear ALL trade data. This cannot be undone!');
      if (confirmText !== 'DELETE') {
        alert('Data NOT cleared. Type DELETE to confirm.');
        return;
      }
      
      try {
        // Get current user
        const { data: { user } } = await sbClient.auth.getUser();
        if (!user) {
          alert('Not logged in');
          return;
        }
        
        // Delete all trades for this user
        const { error: stockError } = await sbClient
          .from('stock_trades')
          .delete()
          .eq('user_id', user.id);

        const { error: optionsError } = await sbClient
          .from('options_trades')
          .delete()
          .eq('user_id', user.id);

        if (stockError || optionsError) {
          alert('Error clearing data: ' + (stockError?.message || optionsError?.message));
          return;
        }

        // Reset adaptive P&L data (clear adapted_at timestamps from symbol_rules)
        const { data: stockBots } = await sbClient.from('stock_bots').select('id,symbol_rules').eq('user_id', user.id);
        for (const bot of stockBots || []) {
          if (bot.symbol_rules && bot.symbol_rules.length > 0) {
            const resetRules = bot.symbol_rules.map(r => ({ ...r, adapted_at: null, tp: r.tp || 15, sl: r.sl || -5 }));
            await sbClient.from('stock_bots').update({ symbol_rules: resetRules }).eq('id', bot.id);
          }
        }

        const { data: optionsBots } = await sbClient.from('options_bots').select('id,symbol_rules').eq('user_id', user.id);
        for (const bot of optionsBots || []) {
          if (bot.symbol_rules && bot.symbol_rules.length > 0) {
            const resetRules = bot.symbol_rules.map(r => ({ ...r, adapted_at: null, tp: r.tp || 50, sl: r.sl || -25 }));
            await sbClient.from('options_bots').update({ symbol_rules: resetRules }).eq('id', bot.id);
          }
        }

        alert('All trade data cleared! Adaptive P&L reset.');
        location.reload();
      } catch (err) {
        alert('Error: ' + err.message);
      }
    }

    // Recalculate P&L for TODAY's closed trades only (performance optimized)
    async function recalculateAllPnl() {
      if (!confirm('Recalculate P&L for TODAY\'s closed trades?\n\nThis will recalculate profit/loss for trades from today only (performance optimized).')) return;
      
      console.log('[Recalc All] Starting TODAY-ONLY P&L recalculation...');
      
      try {
        const { data: { user } } = await sbClient.auth.getUser();
        if (!user) {
          alert('Not logged in');
          return;
        }
        
        let recalcCount = 0;
        let totalOldPnl = 0;
        let totalNewPnl = 0;
        const errors = [];
        
        // Get today's date
        const today = new Date().toISOString().split('T')[0];
        
        // ============ STOCK TRADES (TODAY ONLY) ============
        const { data: stockTrades } = await sbClient
          .from('trades')
          .select('*')
          .eq('status', 'closed')
          .eq('user_id', user.id)
          .gte('created_at', today + 'T00:00:00')
          .limit(100);
        
        console.log(`[Recalc All] Found ${stockTrades?.length || 0} closed stock trades`);
        
        for (const trade of (stockTrades || [])) {
          try {
            const oldPnl = Number(trade.pnl) || 0;
            totalOldPnl += oldPnl;
            
            // Get exit price (stored or fetch)
            let exitPrice = trade.exit_price;
            if (!exitPrice) {
              try {
                const { data: session } = await sbClient.auth.getSession();
                const token = session?.access_token || SUPABASE_KEY;
                const res = await fetch(`${SUPABASE_URL}/functions/v1/get-price?symbol=${encodeURIComponent(trade.symbol)}`, {
                  headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }
                });
                const json = await res.json();
                if (json.price) exitPrice = json.price;
              } catch (_) {}
            }
            
            if (!exitPrice) {
              errors.push(`${trade.symbol}: No exit price available`);
              continue;
            }
            
            const qty = Number(trade.quantity);
            const entryPrice = Number(trade.price);
            const newPnl = calcFuturesPnL(trade.symbol, entryPrice, exitPrice, qty, trade.action);
            
            await sbClient.from('trades').update({ exit_price: exitPrice, pnl: newPnl }).eq('id', trade.id);
            
            recalcCount++;
            totalNewPnl += newPnl;
            
          } catch (err) {
            errors.push(`${trade.symbol}: ${err.message}`);
          }
        }
        
        // ============ OPTIONS TRADES (TODAY ONLY) ============
        const { data: optionsTrades } = await sbClient
          .from('options_trades')
          .select('*')
          .eq('status', 'closed')
          .eq('user_id', user.id)
          .gte('created_at', today + 'T00:00:00')
          .limit(200);
        
        console.log(`[Recalc All] Found ${optionsTrades?.length || 0} closed options trades`);
        
        for (const trade of (optionsTrades || [])) {
          try {
            const oldPnl = Number(trade.pnl) || 0;
            totalOldPnl += oldPnl;
            
            // Use stored exit_price or calculate from contracts
            const exitPrice = Number(trade.exit_price);
            const entryPrice = Number(trade.premium_per_contract);
            const contracts = Number(trade.contracts) || 1;
            
            if (!exitPrice || !entryPrice) {
              errors.push(`${trade.symbol}: Missing price data`);
              continue;
            }
            
            const newPnl = (exitPrice - entryPrice) * contracts * 100;
            
            await sbClient.from('options_trades').update({ pnl: newPnl }).eq('id', trade.id);
            
            recalcCount++;
            totalNewPnl += newPnl;
            
          } catch (err) {
            errors.push(`${trade.symbol}: ${err.message}`);
          }
        }
        
        // Refresh stats
        await loadStats();
        
        const diff = totalNewPnl - totalOldPnl;
        const msg = `✓ Recalculated ${recalcCount} trades\n\nOld Total P&L: $${totalOldPnl.toFixed(2)}\nNew Total P&L: $${totalNewPnl.toFixed(2)}\nDifference: ${diff >= 0 ? '+' : ''}$${diff.toFixed(2)}${errors.length > 0 ? '\n\nErrors (' + errors.length + '):\n' + errors.slice(0, 5).join('\n') : ''}`;
        alert(msg);
        console.log(`[Recalc All] Completed. ${recalcCount} trades updated. P&L: $${totalOldPnl.toFixed(2)} → $${totalNewPnl.toFixed(2)}`);
        
      } catch (err) {
        console.error('[Recalc All] Error:', err);
        alert('Error recalculating P&L: ' + err.message);
      }
    }

    // Fetch live option price for open trades
    async function fetchLiveOptionPrice(trade, sessionToken) {
      try {
        const res = await fetch(`${SUPABASE_URL}/functions/v1/options-bot`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${sessionToken}`,
            'apikey': SUPABASE_KEY
          },
          body: JSON.stringify({
            action: 'price',
            optionSymbol: trade.option_symbol,
            symbol: trade.symbol,
            optionType: trade.option_type,
            strike: trade.strike,
            expiry: trade.expiry
          })
        });
        const json = await res.json();
        return json?.price || null;
      } catch (e) {
        return null;
      }
    }

      function buildSignalSummary(label, color, totals, signalName, signalKey = null) {
        console.log(`[buildSignalSummary] ${label}: trades=${totals.trades}, pnl=${totals.pnl}`);
        if (totals.trades === 0) return '';
        const wr = totals.trades > 0 ? ((totals.wins / totals.trades) * 100).toFixed(1) : 0;
        const cursorStyle = signalKey ? 'cursor:pointer;' : '';
        const clickHandler = signalKey ? `onclick="showSignalStats('${signalKey}', '${label.replace(/'/g, "\\'")}')"` : '';
        return `
          <div class="bot-stat-card" style="background:linear-gradient(135deg,#0a1a0a 0%,#0d0d0d 100%);border:2px solid ${color};border-radius:12px;padding:16px 20px;margin-bottom:15px;${cursorStyle}" ${clickHandler}>
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
              <span style="font-size:1rem;font-weight:700;color:${color};">${label}${signalKey ? ' <span style="font-size:0.7em;opacity:0.5;">(click for details)</span>' : ''}</span>
              <span style="font-size:0.75rem;color:#666;">${signalName}</span>
            </div>
            <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px;">
              <div style="text-align:center;">
                <div style="font-size:0.7rem;color:#666;text-transform:uppercase;letter-spacing:0.05em;">Trades</div>
                <div style="font-size:1.5rem;font-weight:700;color:#e0e0e0;">${totals.trades}</div>
              </div>
              <div style="text-align:center;">
                <div style="font-size:0.7rem;color:#666;text-transform:uppercase;letter-spacing:0.05em;">Win Rate</div>
                <div style="font-size:1.5rem;font-weight:700;color:#e0e0e0;">${wr}%</div>
              </div>
              <div style="text-align:center;">
                <div style="font-size:0.7rem;color:#666;text-transform:uppercase;letter-spacing:0.05em;">W / L</div>
                <div style="font-size:1.5rem;font-weight:700;"><span style="color:#00e676;">${totals.wins}</span> / <span style="color:#ff5252;">${totals.losses}</span></div>
              </div>
              <div style="text-align:center;">
                <div style="font-size:0.7rem;color:#666;text-transform:uppercase;letter-spacing:0.05em;">Open</div>
                <div style="font-size:1.5rem;font-weight:700;color:#ffd700;">${totals.open}</div>
              </div>
              <div style="text-align:center;">
                <div style="font-size:0.7rem;color:#666;text-transform:uppercase;letter-spacing:0.05em;">P&L</div>
                <div style="font-size:1.5rem;font-weight:700;color:${totals.pnl >= 0 ? '#00e676' : '#ff5252'};">${formatMoney(totals.pnl)}</div>
              </div>
            </div>
          </div>
        `;
      }

      // Add signal-specific portfolio summaries if there are bots
      if ((stockBots.length + optionsBots.length) > 0) {
        console.log('[Final Signal Totals]', JSON.stringify(signalTotals));
        console.log('[totalAllPnl]', totalAllPnl, 'totalAllTrades', totalAllTrades);
        const b21 = buildSignalSummary('Boof 21', '#00d4ff', signalTotals.boof21, '35/-10 Strategy', 'boof21');
        const b22 = buildSignalSummary('Boof 22', '#ffd700', signalTotals.boof22, 'SR Cluster + ATR Based', 'boof22');
        const b23 = buildSignalSummary('Boof 23', '#ff7043', signalTotals.boof23, 'SR + ZigZag Regime', 'boof23');
        const other = buildSignalSummary('Other', '#888888', signalTotals.other, 'Misc Signals', 'other');
        
        const allWinRate = totalAllTrades > 0 ? ((totalAllWins / totalAllTrades) * 100).toFixed(1) : 0;
        
        botStatsHtml += `
          <div style="margin-top:30px;border-top:2px solid #333;padding-top:20px;">
            <h2 class="section-title" style="margin-top:0;">📊 Portfolio Summary — By Signal Type</h2>
            ${b21}${b22}${b23}${other}
            
            <div class="bot-stat-card" style="background:linear-gradient(135deg,#0a0a0a 0%,#0d0d0d 100%);border:2px solid ${totalAllPnl >= 0 ? '#00e676' : '#ff5252'};border-radius:12px;padding:16px 20px;margin-top:20px;">
              <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
                <span style="font-size:1rem;font-weight:700;color:#e0e0e0;">📊 All Bots Combined</span>
              </div>
              <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px;">
                <div style="text-align:center;">
                  <div style="font-size:0.7rem;color:#666;text-transform:uppercase;letter-spacing:0.05em;">Total Trades</div>
                  <div style="font-size:1.5rem;font-weight:700;color:#e0e0e0;">${totalAllTrades}</div>
                </div>
                <div style="text-align:center;">
                  <div style="font-size:0.7rem;color:#666;text-transform:uppercase;letter-spacing:0.05em;">Win Rate</div>
                  <div style="font-size:1.5rem;font-weight:700;color:#e0e0e0;">${allWinRate}%</div>
                </div>
                <div style="text-align:center;">
                  <div style="font-size:0.7rem;color:#666;text-transform:uppercase;letter-spacing:0.05em;">Wins / Losses</div>
                  <div style="font-size:1.5rem;font-weight:700;"><span style="color:#00e676;">${totalAllWins}</span> / <span style="color:#ff5252;">${totalAllLosses}</span></div>
                </div>
                <div style="text-align:center;">
                  <div style="font-size:0.7rem;color:#666;text-transform:uppercase;letter-spacing:0.05em;">Open</div>
                  <div style="font-size:1.5rem;font-weight:700;color:#ffd700;">${totalAllOpen}</div>
                </div>
                <div style="text-align:center;">
                  <div style="font-size:0.7rem;color:#666;text-transform:uppercase;letter-spacing:0.05em;">Total P&L</div>
                  <div style="font-size:1.5rem;font-weight:700;color:${totalAllPnl >= 0 ? '#00e676' : '#ff5252'};">${formatMoney(totalAllPnl)}</div>
                </div>
              </div>
              <div style="text-align:center;padding-top:12px;border-top:1px solid #222;margin-top:12px;">
                <span style="font-size:0.85rem;color:#888;">${stockBots.length} stock bots · ${optionsBots.length} options bots</span>
              </div>
            </div>
          </div>
        `;
      }

      container.innerHTML = botStatsHtml || '<div class="empty-state">No bots found</div>';
    }

    function toggleDailyPnl(id) {
      const el = document.getElementById(id);
      if (!el) return;
      el.style.display = el.style.display === 'none' ? 'block' : 'none';
    }

    function formatMoney(amount) {
      const sign = amount >= 0 ? '+' : '';
      return sign + '$' + amount.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    }

    async function showSignalStats(signalKey, signalName) {
      const modal = document.getElementById('signal-stats-modal');
      const title = document.getElementById('signal-stats-title');
      const content = document.getElementById('signal-stats-content');
      title.textContent = `${signalName} — All Bots`;
      content.innerHTML = '<div style="text-align:center;padding:40px;color:#666;">Loading...</div>';
      modal.style.display = 'flex';

      try {
        const { data: bots } = await sbClient.from('options_bots')
          .select('*')
          .ilike('bot_signal', signalKey === 'other' ? `%${signalKey}%` : signalKey)
          .order('created_at', { ascending: false });

        if (!bots || bots.length === 0) {
          content.innerHTML = '<div style="text-align:center;padding:40px;color:#666;">No bots found with this signal</div>';
          return;
        }

        let html = '<table style="width:100%;border-collapse:collapse;font-size:0.85rem;">';
        html += '<thead><tr style="border-bottom:1px solid #2a2a2a;color:#888;"><th style="text-align:left;padding:10px;">Bot Name</th><th style="text-align:right;padding:10px;">Symbol</th><th style="text-align:right;padding:10px;">Trades</th><th style="text-align:right;padding:10px;">Win Rate</th><th style="text-align:right;padding:10px;">P&L</th></tr></thead><tbody>';

        for (const bot of bots) {
          const { data: trades } = await sbClient.from('options_trades')
            .select('*')
            .eq('bot_id', bot.id)
            .eq('status', 'closed');

          const closedTrades = trades || [];
          const totalTrades = closedTrades.length;
          const wins = closedTrades.filter(t => (Number(t.pnl) || 0) > 0).length;
          const totalPnl = closedTrades.reduce((sum, t) => sum + (Number(t.pnl) || 0), 0);
          const winRate = totalTrades > 0 ? (wins / totalTrades) * 100 : 0;
          const pnlColor = totalPnl >= 0 ? '#00e676' : '#ff4444';

          html += `<tr style="border-bottom:1px solid #1a1a1a;">
            <td style="padding:10px;">${bot.name}</td>
            <td style="text-align:right;padding:10px;">${bot.bot_symbol || 'Scan'}</td>
            <td style="text-align:right;padding:10px;">${totalTrades}</td>
            <td style="text-align:right;padding:10px;">${winRate.toFixed(1)}%</td>
            <td style="text-align:right;padding:10px;color:${pnlColor};">$${totalPnl.toFixed(2)}</td>
          </tr>`;
        }

        html += '</tbody></table>';
        content.innerHTML = html;
      } catch (err) {
        content.innerHTML = `<div style="text-align:center;padding:40px;color:#ff4444;">Error loading stats: ${err.message}</div>`;
      }
    }

    function closeSignalStatsModal() {
      document.getElementById('signal-stats-modal').style.display = 'none';
    }

    function updateStatValue(id, value, isMoney) {
      const el = document.getElementById(id);
      el.textContent = isMoney ? formatMoney(value) : value.toLocaleString();
      el.className = 'stat-value ' + (value > 0 ? 'positive' : value < 0 ? 'negative' : 'neutral');
    }

    // Auth state listener - load stats when authenticated
    sbClient.auth.onAuthStateChange((event, session) => {
      if (event === 'SIGNED_IN' && session) {
        loadStats();
      } else if (event === 'SIGNED_OUT') {
        window.location.href = 'index.html';
      }
    });

    // Try loading immediately if already logged in
    sbClient.auth.getSession().then(({ data: { session } }) => {
      if (session) {
        loadStats();
      } else {
        window.location.href = 'index.html';
      }
    });

    // Update timestamp display
    function updateTimestamp() {
      const el = document.getElementById('last-updated');
      if (el) {
        const now = new Date();
        el.textContent = 'Updated: ' + now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      }
    }
    
    // Auto-refresh stats every 10 seconds for real-time accuracy
    setInterval(() => {
      console.log('[Stats] Auto-refreshing...');
      loadStats();
    }, 10000);
    
    // Also update timestamp after each load
    const originalLoadStats = loadStats;
    loadStats = async function() {
      await originalLoadStats();
      updateTimestamp();
    }
  </script>

  <!-- Daily Analysis Modal -->
  <div id="daily-analysis-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:1000;align-items:center;justify-content:center;padding:20px;">
    <div style="background:#111;border:1px solid #333;border-radius:16px;width:100%;max-width:900px;max-height:90vh;overflow-y:auto;padding:24px 28px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;border-bottom:1px solid #222;padding-bottom:12px;">
        <h2 style="font-size:1.2rem;color:#00e676;">📊 Daily Trade Analysis - <span id="analysis-date"></span></h2>
        <button onclick="closeDailyAnalysis()" style="background:none;border:none;color:#888;font-size:1.5rem;cursor:pointer;">×</button>
      </div>
      <div id="daily-analysis-content" style="font-size:0.9rem;line-height:1.6;">
        <div style="text-align:center;color:#666;padding:40px;">Loading analysis...</div>
      </div>
    </div>
  </div>

  <!-- Signal Stats Modal -->
  <div id="signal-stats-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:1000;align-items:center;justify-content:center;padding:20px;">
    <div style="background:#111;border:1px solid #333;border-radius:16px;width:100%;max-width:900px;max-height:90vh;overflow-y:auto;padding:24px 28px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;border-bottom:1px solid #222;padding-bottom:12px;">
        <h2 style="font-size:1.2rem;color:#00e676;" id="signal-stats-title">Signal Stats</h2>
        <button onclick="closeSignalStatsModal()" style="background:none;border:none;color:#888;font-size:1.5rem;cursor:pointer;">×</button>
      </div>
      <div id="signal-stats-content" style="font-size:0.9rem;line-height:1.6;">
        <div style="text-align:center;color:#666;padding:40px;">Loading...</div>
      </div>
    </div>
  </div>

  <script>
    // Daily Trade Analysis Function
    async function showDailyAnalysis() {
      const modal = document.getElementById('daily-analysis-modal');
      const content = document.getElementById('daily-analysis-content');
      const dateSpan = document.getElementById('analysis-date');
      
      modal.style.display = 'flex';
      content.innerHTML = '<div style="text-align:center;color:#666;padding:40px;">Analyzing today\'s trades...</div>';
      
      // Use local midnight as the trading day boundary, but compare against UTC DB timestamps
      const now = new Date();
      const currentHour = now.getHours();
      
      // If before 6 AM local, show previous trading day
      let tradingDay = new Date(now);
      if (currentHour < 6) {
        tradingDay.setDate(tradingDay.getDate() - 1);
      }
      
      // Local date label (e.g. "2026-05-27")
      const localDateStr = `${tradingDay.getFullYear()}-${String(tradingDay.getMonth()+1).padStart(2,'0')}-${String(tradingDay.getDate()).padStart(2,'0')}`;
      
      // Convert local midnight and next-day midnight to UTC ISO strings for DB query
      const dayStart = new Date(tradingDay);
      dayStart.setHours(0, 0, 0, 0);
      const dayEnd = new Date(tradingDay);
      dayEnd.setHours(23, 59, 59, 999);
      
      const todayStart = dayStart.toISOString();
      const todayEnd = dayEnd.toISOString();
      
      dateSpan.textContent = localDateStr;
      
      try {
        const { data: { user } } = await sbClient.auth.getUser();
        if (!user) { content.innerHTML = '<div style="color:#ff6b6b;">Please sign in</div>'; return; }
        
        // Fetch all bots
        const { data: bots } = await sbClient.from('options_bots')
          .select('*')
          .eq('user_id', user.id);
        
        if (!bots || bots.length === 0) {
          content.innerHTML = '<div style="color:#666;">No bots found</div>';
          return;
        }
        
        // Fetch all trades for the trading day
        const { data: allTrades } = await sbClient.from('options_trades')
          .select('*')
          .eq('user_id', user.id)
          .gte('created_at', todayStart)
          .lte('created_at', todayEnd);
        
        // Group trades by bot_id
        const tradesByBot = {};
        for (const trade of allTrades || []) {
          if (!tradesByBot[trade.bot_id]) {
            tradesByBot[trade.bot_id] = [];
          }
          tradesByBot[trade.bot_id].push(trade);
        }
        
        // Sort bots by signal: boof21, boof22, boof23
        const signalOrder = { 'boof21': 1, 'boof22': 2, 'boof23': 3 };
        bots.sort((a, b) => {
          const orderA = signalOrder[a.bot_signal] || 99;
          const orderB = signalOrder[b.bot_signal] || 99;
          return orderA - orderB;
        });
        
        let html = '';
        let totalDayPnl = 0;
        let totalDayTrades = 0;
        let totalDayWins = 0;
        let totalDayLosses = 0;
        
        for (const bot of bots) {
          const todayTrades = tradesByBot[bot.id] || [];
          
          if (todayTrades.length === 0) continue;
          
          const closedTrades = todayTrades.filter(t => t.status === 'closed');
          const openTrades = todayTrades.filter(t => t.status === 'open');
          const wins = closedTrades.filter(t => (t.pnl || 0) > 0);
          const losses = closedTrades.filter(t => (t.pnl || 0) <= 0);
          
          const pnl = closedTrades.reduce((sum, t) => sum + (t.pnl || 0), 0);
          const winCount = wins.length;
          const lossCount = losses.length;
          const totalClosed = closedTrades.length;
          const winRate = totalClosed > 0 ? (winCount / totalClosed * 100).toFixed(1) : 0;
          
          totalDayPnl += pnl;
          totalDayTrades += todayTrades.length;
          totalDayWins += winCount;
          totalDayLosses += lossCount;
          
          html += `
            <div style="background:linear-gradient(135deg,#1a1a00 0%,#0d0d00 100%);border:1px solid #332200;border-radius:12px;padding:16px;margin-bottom:16px;">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;border-bottom:1px solid #222;padding-bottom:10px;">
                <div>
                  <div style="font-size:1.1rem;font-weight:700;color:#e0e0e0;">${bot.name}</div>
                  <div style="font-size:0.75rem;color:#888;">${bot.bot_signal || 'N/A'} | ${bot.bot_interval || 'N/A'} | $${bot.bot_dollar_amount || 0}/trade</div>
                </div>
                <div style="text-align:right;">
                  <div style="font-size:1.3rem;font-weight:700;color:${pnl >= 0 ? '#00e676' : '#ff5252'};">${pnl >= 0 ? '+' : ''}$${pnl.toFixed(2)}</div>
                  <div style="font-size:0.75rem;color:#888;">${winRate}% WR (${winCount}W/${lossCount}L)</div>
                </div>
              </div>
              
              <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:12px;">
                <div style="background:#0a0a0a;border-radius:6px;padding:8px;text-align:center;">
                  <div style="font-size:0.7rem;color:#666;">Total</div>
                  <div style="font-size:1rem;font-weight:600;">${todayTrades.length}</div>
                </div>
                <div style="background:#0a0a0a;border-radius:6px;padding:8px;text-align:center;">
                  <div style="font-size:0.7rem;color:#666;">Closed</div>
                  <div style="font-size:1rem;font-weight:600;">${totalClosed}</div>
                </div>
                <div style="background:#0a0a0a;border-radius:6px;padding:8px;text-align:center;">
                  <div style="font-size:0.7rem;color:#666;">Open</div>
                  <div style="font-size:1rem;font-weight:600;color:#ffd700;">${openTrades.length}</div>
                </div>
                <div style="background:#0a0a0a;border-radius:6px;padding:8px;text-align:center;">
                  <div style="font-size:0.7rem;color:#666;">Avg/Trade</div>
                  <div style="font-size:1rem;font-weight:600;color:${pnl/totalClosed >= 0 ? '#00e676' : '#ff5252'};">${totalClosed > 0 ? '$' + (pnl/totalClosed).toFixed(2) : 'N/A'}</div>
                </div>
              </div>
          `;
          
          // Closed trades table
          if (closedTrades.length > 0) {
            html += `<div style="margin-bottom:10px;"><div style="font-size:0.7rem;color:#555;margin-bottom:6px;text-transform:uppercase;">Closed Trades</div>`;
            html += `<div style="background:#0a0a0a;border-radius:6px;overflow:hidden;">`;
            closedTrades.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
            for (const t of closedTrades) {
              const time = t.created_at.split('T')[1].slice(0,5);
              const emoji = (t.pnl || 0) > 0 ? '🟢' : '🔴';
              const color = (t.pnl || 0) > 0 ? '#00e676' : '#ff5252';
              html += `
                <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-bottom:1px solid #1a1a1a;font-size:0.85rem;">
                  <span style="color:#888;">${time}</span>
                  <span style="font-weight:600;">${t.symbol || 'N/A'}</span>
                  <span style="color:#888;">x${t.contracts || 1}</span>
                  <span style="color:${color};font-weight:600;">${emoji} $${(t.pnl || 0).toFixed(2)}</span>
                  <span style="font-size:0.75rem;color:#666;background:#222;padding:2px 6px;border-radius:3px;">${t.exit_reason || 'N/A'}</span>
                </div>
              `;
            }
            html += `</div></div>`;
          }
          
          // Open trades
          if (openTrades.length > 0) {
            html += `<div><div style="font-size:0.7rem;color:#555;margin-bottom:6px;text-transform:uppercase;">Open Trades</div>`;
            html += `<div style="background:#0a0a0a;border-radius:6px;overflow:hidden;">`;
            for (const t of openTrades) {
              const time = t.created_at.split('T')[1].slice(0,5);
              html += `
                <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-bottom:1px solid #1a1a1a;font-size:0.85rem;color:#ffd700;">
                  <span style="color:#888;">${time}</span>
                  <span style="font-weight:600;">${t.symbol || 'N/A'}</span>
                  <span style="color:#888;">x${t.contracts || 1}</span>
                  <span>Entry: $${(t.premium_per_contract || 0).toFixed(2)}</span>
                  <span style="font-size:0.75rem;color:#666;">⏳ OPEN</span>
                </div>
              `;
            }
            html += `</div></div>`;
          }
          
          html += `</div>`;
        }
        
        // Summary header
        const dayWinRate = totalDayWins + totalDayLosses > 0 ? (totalDayWins / (totalDayWins + totalDayLosses) * 100).toFixed(1) : 0;
        html = `
          <div style="background:linear-gradient(135deg,#0a1a0a 0%,#0d0d0d 100%);border:2px solid ${totalDayPnl >= 0 ? '#00e676' : '#ff5252'};border-radius:12px;padding:20px;margin-bottom:24px;text-align:center;">
            <div style="font-size:0.8rem;color:#666;margin-bottom:8px;">TODAY'S TOTAL PERFORMANCE</div>
            <div style="font-size:2.5rem;font-weight:800;color:${totalDayPnl >= 0 ? '#00e676' : '#ff5252'};margin-bottom:8px;">
              ${totalDayPnl >= 0 ? '+' : ''}$${totalDayPnl.toFixed(2)}
            </div>
            <div style="display:flex;justify-content:center;gap:40px;font-size:0.9rem;">
              <span><strong>${totalDayTrades}</strong> trades</span>
              <span style="color:#00e676;"><strong>${totalDayWins}</strong> wins</span>
              <span style="color:#ff5252;"><strong>${totalDayLosses}</strong> losses</span>
              <span><strong>${dayWinRate}%</strong> WR</span>
            </div>
          </div>
        ` + html;
        
        content.innerHTML = html || '<div style="color:#666;text-align:center;padding:40px;">No trades today</div>';
        
      } catch (e) {
        console.error('Daily analysis error:', e);
        content.innerHTML = `<div style="color:#ff6b6b;">Error: ${e.message}</div>`;
      }
    }
    
    function closeDailyAnalysis() {
      document.getElementById('daily-analysis-modal').style.display = 'none';
    }
    
    // Close modal on backdrop click
    document.getElementById('daily-analysis-modal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeDailyAnalysis();
    });
  </script>
